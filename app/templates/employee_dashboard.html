<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | BankOps</title>

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Custom scrollbar for modern look */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(148, 163, 184, 0.5);
            /* Slate 400 */
            border-radius: 20px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(71, 85, 105, 0.5);
            /* Slate 600 */
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased selection:bg-indigo-500 selection:text-white transition-colors duration-300 h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <aside
        class="w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col transition-colors z-20 shadow-sm relative h-full">
        <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-xl bg-gradient-to-tr from-indigo-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/20 text-white font-bold">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white">BankOps</h2>
            </div>
        </div>

        <nav class="flex-1 p-4 overflow-y-auto custom-scrollbar">
            <ul class="space-y-1.5 font-medium">
                <li>
                    <a href="employee_dashboard.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-500 text-white shadow-md shadow-indigo-500/20 transition-all duration-200">
                        <svg class="w-5 h-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01">
                            </path>
                        </svg>
                        Pending Requests
                    </a>
                </li>
            </ul>
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-slate-800 space-y-2">
            <button onclick="toggleDarkMode()"
                class="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/80 text-slate-600 dark:text-slate-300 hover:border-slate-300 dark:hover:border-slate-600 transition-all cursor-pointer">
                <span class="font-medium text-sm text-slate-700 dark:text-slate-300">Theme</span>
                <span class="text-lg" id="themeBtn">🌙</span>
            </button>
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-red-200 dark:border-red-900/50 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/20 font-medium transition-all active:scale-[0.98] cursor-pointer">
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 transition-colors relative z-10 h-full overflow-hidden">
        <!-- Professional background accents -->
        <div class="absolute top-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div
                class="absolute -top-40 -right-40 w-[600px] h-[600px] rounded-full bg-slate-300/20 dark:bg-slate-800/20 blur-[120px]">
            </div>
            <div
                class="absolute top-60 left-20 w-[400px] h-[400px] rounded-full bg-indigo-300/10 dark:bg-indigo-600/5 blur-[120px]">
            </div>
        </div>

        <div class="flex-1 p-6 lg:p-10 overflow-y-auto relative z-10 flex flex-col h-full custom-scrollbar">
            <!-- Header -->
            <header class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4 animate-fade-in shrink-0">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-2">
                        Dashboard</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm md:text-base font-medium">Manage pending
                        service requests efficiently.</p>
                </div>

                <div
                    class="flex items-center gap-2 text-sm font-medium text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-4 py-2 rounded-xl shadow-sm">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    System Online
                </div>
            </header>

            <!-- Table Container -->
            <div class="flex-1 bg-white dark:bg-slate-800/60 dark:backdrop-blur-lg border border-slate-200 dark:border-slate-700 rounded-3xl shadow-sm overflow-hidden animate-fade-in flex flex-col min-h-0"
                style="animation-delay: 0.1s;">

                <!-- Table Header Top Bar -->
                <div
                    class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-slate-900 dark:text-white">Active Requests</h3>
                </div>

                <!-- Table Content -->
                <div class="overflow-x-auto overflow-y-auto flex-1 custom-scrollbar">
                    <table class="w-full whitespace-nowrap text-left border-collapse">
                        <!-- TABLE HEADER -->
                        <thead
                            class="bg-white/50 dark:bg-slate-900/50 backdrop-blur border-b border-slate-200 dark:border-slate-700 sticky top-0 z-10">
                            <tr>
                                <th
                                    class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-center">
                                    ID</th>
                                <th
                                    class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-center">
                                    Account</th>
                                <th
                                    class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-center">
                                    Query Type</th>
                                <th
                                    class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-left">
                                    Description</th>
                                <th
                                    class="py-4 px-6 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-center">
                                    Actions</th>
                            </tr>
                        </thead>

                        <!-- TABLE BODY -->
                        <tbody id="request_table"
                            class="divide-y divide-slate-100 dark:divide-slate-700/50 bg-transparent text-sm text-slate-700 dark:text-slate-300">
                            <!-- JS inserts rows -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script src="{{ url_for('static',filename='js/api.js') }}"></script>
    <script src="{{ url_for('static',filename='js/employee_dashboard.js') }}"></script>
</body>

</html>
