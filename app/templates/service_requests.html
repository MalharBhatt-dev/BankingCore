<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Requests | BankingCore</title>

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .text-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        /* Custom scrollbar for modern look */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 20px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(75, 85, 99, 0.5);
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased selection:bg-blue-500 selection:text-white transition-colors duration-300 h-screen overflow-hidden flex">

    <!-- Sidebar -->
    <aside
        class="w-72 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col transition-colors z-20 shadow-sm relative h-full">
        <div class="p-6 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-xl bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 8h6m-5 0a3 3 0 110 6H9l3 3m-3-6h6m6 1a9 9 0 11-18 0 9 9 0 0118 0z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">BankingCore</h2>
            </div>
        </div>

        <nav class="flex-1 p-4 overflow-y-auto custom-scrollbar">
            <ul class="space-y-1.5 font-medium">
                <li>
                    <a href="dashboard.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                            </path>
                        </svg>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="transfer.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                        Transfer
                    </a>
                </li>
                <li>
                    <a href="transactions.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        Transactions
                    </a>
                </li>
                <li>
                    <a href="service_requests.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-cyan-500 text-white shadow-md shadow-blue-500/20 transition-all duration-200">
                        <svg class="w-5 h-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                            </path>
                        </svg>
                        Service Requests
                    </a>
                </li>
            </ul>
        </nav>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
            <button onclick="toggleDarkMode()"
                class="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/80 text-gray-600 dark:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 transition-all cursor-pointer">
                <span class="font-medium text-sm">Theme</span>
                <span class="text-lg" id="themeBtn">🌙</span>
            </button>
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-red-200 dark:border-red-900/50 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/20 font-medium transition-all active:scale-[0.98] cursor-pointer">
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 transition-colors relative z-10 h-full overflow-hidden">
        <!-- Optional top blurred background accent -->
        <div class="absolute top-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div
                class="absolute -top-40 -right-40 w-[600px] h-[600px] rounded-full bg-blue-300/10 dark:bg-blue-600/5 blur-[120px]">
            </div>
            <div
                class="absolute top-60 left-20 w-[400px] h-[400px] rounded-full bg-cyan-300/10 dark:bg-cyan-600/5 blur-[120px]">
            </div>
        </div>

        <div class="flex-1 p-6 lg:p-10 overflow-y-auto relative z-10 flex flex-col h-full custom-scrollbar">
            <!-- Header -->
            <header class="flex flex-col xl:flex-row xl:items-end justify-between mb-8 gap-6 animate-fade-in shrink-0">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-2">
                        Service Requests</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm md:text-base font-medium">Manage and track your account requests seamlessly.</p>
                </div>
                
                <!-- Filters & Actions -->
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative w-full sm:w-auto">
                        <select class="w-full appearance-none bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium rounded-xl py-2.5 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm outline-none cursor-pointer text-sm">
                            <option>All Select</option>
                            <option>Pending</option>
                            <option>Approved</option>
                            <option>Completed</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 dark:text-gray-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>

                    <div class="relative w-full sm:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <input type="text" placeholder="Search requests..."
                            class="w-full bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-xl py-2.5 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm text-sm transition-shadow">
                    </div>
                </div>
            </header>

            <!-- Main Flex Layout -->
            <div class="flex flex-col xl:flex-row gap-6 lg:gap-8 flex-1 min-h-0">
                
                <!-- Left: Request Form -->
                <div class="w-full xl:w-1/3 flex flex-col animate-fade-in shrink-0" style="animation-delay: 0.1s;">
                    <div class="flex items-center gap-3 mb-4">
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white">Create Request</h2>
                        <div class="h-px flex-1 bg-gray-200 dark:bg-gray-800"></div>
                    </div>

                    <div class="bg-white dark:bg-gray-800/60 dark:backdrop-blur-lg border border-gray-200 dark:border-gray-700 p-6 lg:p-8 rounded-3xl shadow-sm hover:shadow-xl dark:shadow-black/30 transition-all duration-300">
                        <form onsubmit="event.preventDefault(); createRequest();" class="space-y-5">
                            
                            <!-- Request Type -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Request Type</label>
                                <div class="relative">
                                    <select id="query_type" class="w-full appearance-none bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-xl py-3 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all shadow-sm">
                                        <option value="CHANGE_PIN">Change PIN</option>
                                        <option value="CHANGE_ACCOUNT_NAME">Change Account Name</option>
                                    </select>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                            </div>

                            <!-- Assign Employee -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Assign Employee</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="employee" value="1004" class="peer sr-only">
                                        <div class="flex items-center justify-center p-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/20 peer-checked:border-blue-500 peer-checked:bg-blue-50 dark:peer-checked:bg-blue-900/30 peer-checked:text-blue-700 dark:peer-checked:text-blue-400 font-medium transition-all shadow-sm text-sm">
                                            Mr. ABC
                                        </div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="employee" value="1005" class="peer sr-only">
                                        <div class="flex items-center justify-center p-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-blue-900/20 peer-checked:border-blue-500 peer-checked:bg-blue-50 dark:peer-checked:bg-blue-900/30 peer-checked:text-blue-700 dark:peer-checked:text-blue-400 font-medium transition-all shadow-sm text-sm">
                                            Mr. XYZ
                                        </div>
                                    </label>
                                </div>
                            </div>

                            <!-- Description -->
                            <div class="space-y-2">
                                <label class="text-sm font-semibold text-gray-700 dark:text-gray-300">Description</label>
                                <textarea id="description" placeholder="Describe your request in detail..." rows="4" 
                                    class="w-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-600 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium custom-scrollbar shadow-sm resize-none"></textarea>
                            </div>

                            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white py-3.5 rounded-xl font-bold hover:shadow-lg hover:shadow-blue-500/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-2">
                                Submit Request →
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Right: Requests Table Container -->
                <div class="w-full xl:w-2/3 flex flex-col animate-fade-in flex-1 min-h-0" style="animation-delay: 0.2s;">
                    <div class="flex items-center gap-3 mb-4">
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white">My Requests</h2>
                        <div class="h-px flex-1 bg-gray-200 dark:bg-gray-800"></div>
                    </div>
                    
                    <div class="bg-white dark:bg-gray-800/60 dark:backdrop-blur-lg border border-gray-200 dark:border-gray-700 rounded-3xl shadow-sm overflow-hidden flex flex-col flex-1 min-h-0">
                        <div class="overflow-x-auto overflow-y-auto flex-1 custom-scrollbar">
                            <table class="w-full whitespace-nowrap text-left border-collapse">
                                <!-- TABLE HEADER -->
                                <thead class="bg-gray-50/80 dark:bg-gray-900/50 backdrop-blur border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
                                    <tr>
                                        <th class="py-4 px-6 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">Type</th>
                                        <th class="py-4 px-6 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">Description</th>
                                        <th class="py-4 px-6 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">Status</th>
                                        <th class="py-4 px-6 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">Created</th>
                                        <th class="py-4 px-6 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">Employee</th>
                                        <th class="py-4 px-6 text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-center">Actions</th>
                                    </tr>
                                </thead>

                                <!-- TABLE BODY -->
                                <tbody id="request_table" class="divide-y divide-gray-100 dark:divide-gray-700/50 bg-white dark:bg-transparent text-sm">
                                    <!-- JS inserts rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="{{ url_for('static',filename='js/api.js') }}"></script>
    <script src="{{ url_for('static',filename='js/service_requests.js') }}"></script>
</body>

</html>
