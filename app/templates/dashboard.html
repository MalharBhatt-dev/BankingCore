<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Dashboard | BankingCore</title>

    <!-- Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .text-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased selection:bg-blue-500 selection:text-white transition-colors duration-300 min-h-screen flex">

    <!-- Sidebar -->
    <aside
        class="w-72 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col transition-colors z-20 shadow-sm relative">
        <div class="p-6 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-xl bg-gradient-to-tr from-blue-600 to-cyan-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 8h6m-5 0a3 3 0 110 6H9l3 3m-3-6h6m6 1a9 9 0 11-18 0 9 9 0 0118 0z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-xl font-extrabold tracking-tight text-gray-900 dark:text-white">BankingCore</h2>
            </div>
        </div>

        <nav class="flex-1 p-4 overflow-y-auto">
            <ul class="space-y-1.5 font-medium">
                <li>
                    <a href="/pages/dashboard.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-cyan-500 text-white shadow-md shadow-blue-500/20 transition-all duration-200">
                        <svg class="w-5 h-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                            </path>
                        </svg>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="/pages/transfer.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                        Transfer
                    </a>
                </li>
                <li>
                    <a href="/pages/transactions.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        Transactions
                    </a>
                </li>
                <li>
                    <a href="/pages/service_requests.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        <svg class="w-5 h-5 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                            </path>
                        </svg>
                        Service Requests
                    </a>
                </li>
            </ul>
        </nav>

        <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
            <button onclick="toggleDarkMode()"
                class="w-full flex items-center justify-between px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/80 text-gray-600 dark:text-gray-300 hover:border-gray-300 dark:hover:border-gray-600 transition-all cursor-pointer">
                <span class="font-medium text-sm">Theme</span>
                <span class="text-lg" id="themeBtn">🌙</span>
            </button>
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-red-200 dark:border-red-900/50 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/20 font-medium transition-all active:scale-[0.98] cursor-pointer">
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 transition-colors relative z-10">
        <!-- Optional top blurred background accent -->
        <div class="absolute top-0 w-full h-full overflow-hidden z-0 pointer-events-none">
            <div
                class="absolute -top-40 -right-40 w-[600px] h-[600px] rounded-full bg-blue-300/10 dark:bg-blue-600/5 blur-[120px]">
            </div>
            <div
                class="absolute top-60 left-20 w-[400px] h-[400px] rounded-full bg-cyan-300/10 dark:bg-cyan-600/5 blur-[120px]">
            </div>
        </div>

        <div class="flex-1 p-8 lg:p-12 overflow-y-auto relative z-10">
            <!-- Header -->
            <header class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-4 animate-fade-in">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-2">
                        Dashboard</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm md:text-base font-medium">Welcome back, here's
                        your account overview.</p>
                </div>
            </header>

            <!-- Account Info Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                <!-- Balance Card -->
                <div class="relative overflow-hidden bg-gradient-to-br from-blue-600 to-cyan-500 text-white p-6 rounded-3xl shadow-lg shadow-blue-500/30 dark:shadow-blue-900/20 hover:-translate-y-1 transition-all duration-300 animate-fade-in"
                    style="animation-delay: 0.1s;">
                    <div class="absolute top-0 right-0 p-4 opacity-20">
                        <svg class="w-24 h-24 rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 8h6m-5 0a3 3 0 110 6H9l3 3m-3-6h6m6 1a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                    </div>
                    <div class="relative z-10 flex flex-col h-full justify-between gap-4">
                        <p class="text-white/80 font-medium text-sm tracking-wide uppercase">Available Balance</p>
                        <h2 class="text-4xl lg:text-5xl font-extrabold drop-shadow-sm flex items-start gap-1">
                            <span class="text-2xl mt-1.5 opacity-80">₹</span><span id="balance">0.00</span>
                        </h2>
                    </div>
                </div>

                <!-- Last Transaction -->
                <div class="bg-white dark:bg-gray-800/60 dark:backdrop-blur-lg border border-gray-200 dark:border-gray-700 p-6 rounded-3xl shadow-sm hover:shadow-xl dark:shadow-black/30 hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between animate-fade-in"
                    style="animation-delay: 0.2s;">
                    <div class="flex items-center gap-3 mb-2">
                        <div
                            class="w-10 h-10 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-700 flex items-center justify-center text-gray-400">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <h3 class="text-gray-500 dark:text-gray-400 font-medium text-sm tracking-wide uppercase">Last
                            Transaction</h3>
                    </div>
                    <p id="last_transaction" class="text-xl lg:text-2xl font-bold text-gray-900 dark:text-white mt-1">
                        None</p>
                </div>

                <!-- Account Number -->
                <div class="bg-white dark:bg-gray-800/60 dark:backdrop-blur-lg border border-gray-200 dark:border-gray-700 p-6 rounded-3xl shadow-sm hover:shadow-xl dark:shadow-black/30 hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between animate-fade-in"
                    style="animation-delay: 0.3s;">
                    <div class="flex items-center gap-3 mb-2">
                        <div
                            class="w-10 h-10 rounded-xl bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-700 flex items-center justify-center text-gray-400">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2">
                                </path>
                            </svg>
                        </div>
                        <h3 class="text-gray-500 dark:text-gray-400 font-medium text-sm tracking-wide uppercase">Account
                            Number</h3>
                    </div>
                    <p id="account_info"
                        class="text-xl lg:text-2xl font-bold tracking-widest font-mono text-gray-900 dark:text-white mt-1">
                        ---</p>
                </div>
            </div>

            <!-- Quick Actions Section -->
            <div class="animate-fade-in" style="animation-delay: 0.4s;">
                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-xl font-bold text-gray-900 dark:text-white">Quick Actions</h2>
                    <div class="h-px flex-1 bg-gray-200 dark:bg-gray-800"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Deposit -->
                    <div
                        class="bg-white dark:bg-gray-800/60 dark:backdrop-blur-lg border border-gray-200 dark:border-gray-700 p-6 rounded-3xl shadow-sm hover:shadow-xl dark:shadow-black/30 transition-all duration-300">
                        <div class="flex items-center gap-3 mb-6">
                            <div
                                class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 flex items-center justify-center text-xl border border-emerald-100 dark:border-emerald-800/50">
                                💰
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">Deposit Funds</h3>
                        </div>

                        <div class="relative group mb-5">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="text-gray-500 dark:text-gray-400 font-bold">₹</span>
                            </div>
                            <input type="number" id="deposit_amount" placeholder=" "
                                class="peer w-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-2xl pl-9 pr-4 pt-6 pb-2 focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all font-medium">
                            <label
                                class="absolute left-9 top-2.5 text-gray-500 dark:text-gray-400 text-xs font-semibold uppercase tracking-wider transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case peer-placeholder-shown:tracking-normal peer-focus:top-2.5 peer-focus:text-xs peer-focus:uppercase peer-focus:tracking-wider peer-focus:text-emerald-500">
                                Amount
                            </label>
                        </div>

                        <button onclick="deposit()"
                            class="w-full bg-emerald-500 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-600 active:scale-[0.98] transition-all duration-200 shadow-md shadow-emerald-500/20 flex items-center justify-center gap-2 cursor-pointer">
                            Complete Deposit →
                        </button>
                    </div>

                    <!-- Withdraw -->
                    <div
                        class="bg-white dark:bg-gray-800/60 dark:backdrop-blur-lg border border-gray-200 dark:border-gray-700 p-6 rounded-3xl shadow-sm hover:shadow-xl dark:shadow-black/30 transition-all duration-300">
                        <div class="flex items-center gap-3 mb-6">
                            <div
                                class="w-12 h-12 rounded-2xl bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 flex items-center justify-center text-xl border border-rose-100 dark:border-rose-800/50">
                                💸
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">Withdraw Funds</h3>
                        </div>

                        <div class="relative group mb-5">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <span class="text-gray-500 dark:text-gray-400 font-bold">₹</span>
                            </div>
                            <input type="number" id="withdraw_amount" placeholder=" "
                                class="peer w-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-2xl pl-9 pr-4 pt-6 pb-2 focus:ring-2 focus:ring-rose-500 focus:border-transparent outline-none transition-all font-medium">
                            <label
                                class="absolute left-9 top-2.5 text-gray-500 dark:text-gray-400 text-xs font-semibold uppercase tracking-wider transition-all peer-placeholder-shown:top-4 peer-placeholder-shown:text-sm peer-placeholder-shown:normal-case peer-placeholder-shown:tracking-normal peer-focus:top-2.5 peer-focus:text-xs peer-focus:uppercase peer-focus:tracking-wider peer-focus:text-rose-500">
                                Amount
                            </label>
                        </div>

                        <button onclick="withdraw()"
                            class="w-full bg-rose-500 text-white py-3.5 rounded-xl font-bold hover:bg-rose-600 active:scale-[0.98] transition-all duration-200 shadow-md shadow-rose-500/20 flex items-center justify-center gap-2 cursor-pointer">
                            Complete Withdrawal →
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="{{ url_for('static',filename='js/api.js') }}"></script>
    <script src="{{ url_for('static',filename='js/dashboard.js') }}"></script>
</body>

</html>
