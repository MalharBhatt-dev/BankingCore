<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transactions</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
             <aside class="w-64 bg-blue-900 dark:bg-gray-800  text-white min-h-screen p-6 transition-colors border-white border-1">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="flex flex-col font-semibold min-h-[87vh]">
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transfer.html">Transfer</a>
                    </li>
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="service_requests.html">Service Requests</a>
                    </li>
                    <div class="mt-auto flex justify-between items-center">
                        <!-- Logout (Left) -->
                        <li class="hover:text-red-500 dark:hover:text-red-500 border rounded-lg p-2">
                            <button onclick="logout()" class="cursor-pointer">
                                Logout
                            </button>
                        </li>

                        <!-- Theme Toggle (Right) -->
                        <li>
                            <button onclick="toggleDarkMode()" id="themeBtn"
                                class="cursor-pointer px-3 py-1 border rounded-lg dark:border-gray-600">
                                🌙
                            </button>
                        </li>
                    </div>
                </ul>
            </aside>
                            <!-- Main Content -->
           <div class="flex-1 p-10 bg-gray-100 dark:bg-gray-900 transition">

    <h1 class="text-3xl font-bold mb-8">Transaction History</h1>

    <div class="max-h-[80vh] overflow-y-auto scrollbar-thin flex-1 
                bg-white dark:bg-gray-800 
                shadow rounded-lg transition">

        <div class="p-6">

            <table class="min-w-full text-left border-collapse">

                <!-- TABLE HEADER -->
                <thead class="border-b dark:border-gray-700">

                    <tr class="border-b hover:bg-gray-100 dark:hover:bg-gray-700 transition">

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-left">
                            Type
                        </th>

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center">
                            Amount
                        </th>

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center">
                            Balance After
                        </th>

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center">
                            Date
                        </th>

                    </tr>
                </thead>

                <!-- TABLE BODY -->
                <tbody id="transaction_table" 
                       class="divide-y dark:divide-gray-700">

                    <!-- JS inserts rows -->

                </tbody>

            </table>

        </div>
    </div>
</div>
        </div>
        <script src="./js/api.js"></script>
        <script src="./js/transactions.js"></script> 
    </body>
</html>
