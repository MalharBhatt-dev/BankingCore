<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transactions</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-[#0a2540] dark:to-[#020617] text-gray-900 dark:text-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
             <aside class="w-64 bg-gradient-to-r from-blue-800 to-blue-900 dark:from-[#020617] dark:to-[#0a2540] dark:text-gray-100 backdrop-blur text-white min-h-screen p-6 border-r border-white/10 dark:border-white/10 transition-colors">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="flex flex-col font-semibold min-h-[87vh]">
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class=" p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transfer.html">Transfer</a>
                    </li>
                    <li class="p-2 rounded-lg bg-white/20  hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="service_requests.html">Service Requests</a>
                    </li>
                    <div class="mt-auto flex justify-between items-center">
                        <!-- Logout (Left) -->
                        <li class="hover:text-red-500 dark:hover:text-red-500 border rounded-lg p-2">
                            <button onclick="logout()" class="cursor-pointer">
                                Logout
                            </button>
                        </li>

                        <!-- Theme Toggle (Right) -->
                        <li>
                            <button onclick="toggleDarkMode()" id="themeBtn"
                                class="cursor-pointer px-3 py-1 border rounded-lg dark:border-gray-600">
                                🌙
                            </button>
                        </li>
                    </div>
                </ul>
            </aside>
                            <!-- Main Content -->
                             <div class="flex-1 p-10 bg-gradient-to-br from-gray-100 to-gray-200 dark:from-[#0a2540] dark:to-[#020617] text-gray-900 dark:text-gray-100 transition">
            <div class="flex justify-between items-center mb-6">
                <div>
                <h1 class="animate-[fadeIn_0.5s_ease-out] text-3xl font-bold">Transaction History</h1>
                <p class="animate-[fadeIn_0.6s_ease-out] text-sm text-gray-500 dark:gray-400">Track all your activity</p>
                </div>
                <!--Actions-->
                <div class="flex gap-3">
                    <!--Filter-->
                    <select class="animate-[fadeIn_0.6s_ease-out]  px-3 py-2 rounded-lg border 
                bg-white dark:bg-gray-800 
                dark:border-gray-600 text-sm">
                        <option>All</option>
                        <option>Deposit</option>
                        <option>Withdraw</option>
                        <option>Transfer</option>
                    </select>
                    <input type="text" placeholder="Search..." class="animate-[fadeIn_0.7s_ease-out]  border rounded-lg px-3 py-2 text-sm text-gray-600 dark:text-gray-300 bg-white dark:bg-gray-800 dark:border-gray-600">
                </div>
</div>
    <div class="animate-[fadeIn_0.5s_ease-out]  bg-white/70 dark:bg-gray-800/70 backdrop-blur shadow-xl rounded-2xl border border-gray-200 dark:border-gray-700 max-h-[80vh] overflow-y-auto scrollbar-thin">

        <div class="p-6">

            <table class="min-w-full text-left border-collapse">

                <!-- TABLE HEADER -->
                <thead class="border-b dark:border-gray-700">

                    <tr class="border-b hover:bg-gray-100 dark:hover:bg-gray-700 transition">

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-left">
                            Type
                        </th>

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center">
                            Amount
                        </th>

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center">
                            Balance After
                        </th>

                        <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center">
                            Date
                        </th>

                    </tr>
                </thead>

                <!-- TABLE BODY -->
                <tbody id="transaction_table" 
                       class="divide-y dark:divide-gray-700">

                    <!-- JS inserts rows -->

                </tbody>

            </table>

        </div>
    </div>
</div>
        </div>
        <script src="./js/api.js"></script>
        <script src="./js/transactions.js"></script> 
    </body>
</html>
