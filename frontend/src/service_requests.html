<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bank Dashboard</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
            <aside class="w-64 bg-blue-900 dark:bg-gray-800  text-white min-h-screen p-6 transition-colors border-white border-1">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="flex flex-col font-semibold min-h-[87vh]">
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transfer.html">Transfer</a>
                    </li>
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="service_requests.html">Service Requests</a>
                    </li>
                    <div class="mt-auto flex justify-between items-center">
                        <!-- Logout (Left) -->
                        <li class="hover:text-red-500 dark:hover:text-red-500 border rounded-lg p-2">
                            <button onclick="logout()" class="cursor-pointer">
                                Logout
                            </button>
                        </li>

                        <!-- Theme Toggle (Right) -->
                        <li>
                            <button onclick="toggleDarkMode()" id="themeBtn"
                                class="cursor-pointer px-3 py-1 border rounded-lg dark:border-gray-600">
                                🌙
                            </button>
                        </li>
                    </div>
                </ul>
            </aside>
            <!-- Main Content -->
            <div class="flex-1 p-10">
                <h1 class="text-3xl font-bold mb-8">Service Requests</h1>
                <div class=" bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg w-96 transition">
                    <h2 class="text-lg font-semibold mb-4 dark:text-gray-200">Create Request</h2>
                    <form class="flex-1">
                        <select id="query_type" class="border p-2 w-full mb-3 rounded-lg transition bg-white dark:bg-gray-700 text-black dark:border-gray-600">
                            <option value="CHANGE_PIN">Change PIN</option>
                            <option value="CHANGE_ACCOUNT_NAME">Change Account Name</option>
                            <!--NOTE : <!--h Future Request Feature Implementation -->
                            <!-- <option value="UPDATE_CONTACT">Update Contact</option>
                            <option value="UPDATE_KYC">Update KYC</option>
                            <option value="CLOSE_ACCOUNT">Close Account</option> -->
                        </select>
                        <div class="flex justify-between items-center rounded-lg">
                            <label class="text-b p-2  border-r rounded-lg dark:border-gray-600 dark:text-gray-300">Employee :</label>
                            <em class="flex justify-between items-center  mr-[4.5vh]">
                                <label class="semi-bold p-2 cursor-pointer hover:bold "><input type="radio" name="employee" value="1004">Mr.ABC</label>
                                <label class="semi-bold p-2 cursor-pointer hover:bold"><input type="radio" name="employee" value="1005">Mr.XYZ</label>
                            </em>
                        </div>
                        <textarea id="description" placeholder="Describe your request" class="border mt-3 rounded-lg p-2 w-full mb-3 bg-white dark:bg-gray-700 text-black dark:text-white broder-gray-300 dark:border-gray-600"></textarea>
                        <div class="flex justify-center m-1 rounded-full">
                            <button onclick="createRequest()" class="bg-blue-900 dark:bg-blue-700 text-white px-4 py-2 rounded-lg hover:bg-blue-700 dark:hover:bg-blue-600 cursor-pointer transition">Submit Request
                            </button>
                        </div>
                    </form>
                </div>
                <div>
                <h2 class="text-xl font-semibold mt-10 mb-4">My Requests</h2>
                <div class="w-full max-h-[36.2vh] overflow-y-auto flex-1 bg-white dark:bg-gray-800 shadow-lg rounded-lg transition">
                <table class="min-w-full text-left border-collapse" id="dynamic_table">
                    <thead>
                        <tr class="border-b dark:border-gray-700 hover:bg-gray-300 dark:hover:bg-gray-700">
                            <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center  w-1/5">Type</th>
                            <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center w-1/5">Description</th>  
                            <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center w-1/5">Status</th>
                            <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center w-1/5">Created</th>
                            <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center w-1/5">Employee</th>
                            <th class="p-3 sticky top-0 bg-white dark:bg-gray-800 z-10 text-center w-1/5">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="request_table" class="divide-y dark:divide-gray-700"></tbody>
                </table>
                </div>
                </div>
                <div id="request_form_container" class="hidden ml-[35%] bg-white dark:bg-gray-800 p-6 rounded shadow w-96 transition">
                    <h2 class="text-xl font-semibold mb-4 dark:text-gray-200">Submit Request</h2>
                    <div id="dynamic_form_fields"></div>
                </div>

            </div>
        </div>
        <script src="./js/api.js"></script>
        <script src="./js/service_requests.js"></script>
    </body>
</html>
