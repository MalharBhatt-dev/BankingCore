<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bank Dashboard</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-900 dark:to-gray-950 text-gray-900 dark:text-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
            <aside class="w-64 bg-blue-900 dark:bg-gray-900/80 dark:text-gray-100 backdrop-blur text-white min-h-screen p-6 border-r border-white/10    dark:border-white/10 transition-colors">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="flex flex-col font-semibold min-h-[87vh]">
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class=" p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transfer.html">Transfer</a>
                    </li>
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="p-2 rounded-lg  bg-white/20 hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="service_requests.html">Service Requests</a>
                    </li>
                    <div class="mt-auto flex justify-between items-center">
                        <!-- Logout (Left) -->
                        <li class="hover:text-red-500 dark:hover:text-red-500 border rounded-lg p-2">
                            <button onclick="logout()" class="cursor-pointer">
                                Logout
                            </button>
                        </li>

                        <!-- Theme Toggle (Right) -->
                        <li>
                            <button onclick="toggleDarkMode()" id="themeBtn"
                                class="cursor-pointer px-3 py-1 border rounded-lg dark:border-gray-600">
                                🌙
                            </button>
                        </li>
                    </div>
                </ul>
            </aside>
            <!-- Main Content -->
              <!-- Main Content -->
<div class="flex-1 p-10">

    <!-- HEADER (NOW PERFECTLY ALIGNED) -->
    <div class="flex justify-between items-center mb-8">

        <!-- Left -->
        <div>
            <h1 class="text-3xl font-bold">Service Requests</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Manage and track your requests
            </p>
        </div>

        <!-- Right -->
        <div class="flex items-center gap-3">

            <select class="px-3 py-2 rounded-lg border 
                bg-white dark:bg-gray-800 
                dark:border-gray-600 text-sm">
                <option>All</option>
                <option>Pending</option>
                <option>Approved</option>
                <option>Completed</option>
            </select>
            <input type="text" placeholder="Search..."
                class="px-3 py-2 rounded-lg border 
                bg-white dark:bg-gray-800 
                dark:border-gray-600 text-sm
                focus:ring-2 focus:ring-blue-500 outline-none">

        </div>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-3 gap-8">

        <!-- LEFT (FORM) -->
        <div class="col-span-1">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2 dark:border-gray-700">
                Request Form
            </h2>
            <div class="bg-gradient-to-br from-white to-blue-50 
                dark:from-gray-800 dark:to-gray-900 
                p-6 rounded-2xl shadow-lg border 
                border-gray-200 dark:border-gray-700 
                hover:shadow-2xl transition">

                <h2 class="text-lg font-semibold mb-4">Create Request</h2>

                <form onsubmit="event.preventDefault(); createRequest();">

                    <label class="text-sm text-gray-500 dark:text-gray-400 mb-1 block">
                        Request Type
                    </label>

                    <select id="query_type"
                        class="border p-2 w-full mb-3 rounded-lg 
                        bg-white dark:bg-gray-700 dark:border-gray-600">
                        <option value="CHANGE_PIN">Change PIN</option>
                        <option value="CHANGE_ACCOUNT_NAME">Change Account Name</option>
                    </select>

                    <!-- Employee -->
                    <div class="mt-3">
                        <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">
                            Assign Employee
                        </p>

                        <div class="flex gap-3">
                            <label class="flex items-center gap-2 px-3 py-2 border rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700">
                                <input type="radio" name="employee" value="1004"> Mr.ABC
                            </label>

                            <label class="flex items-center gap-2 px-3 py-2 border rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700">
                                <input type="radio" name="employee" value="1005"> Mr.XYZ
                            </label>
                        </div>
                    </div>

                    <!-- Description -->
                    <textarea id="description"
                        placeholder="Describe your request"
                        class="border mt-3 rounded-lg p-3 w-full 
                        bg-white dark:bg-gray-700 
                        text-black dark:text-white 
                        border-gray-300 dark:border-gray-600
                        focus:ring-2 focus:ring-blue-500 outline-none"></textarea>

                    <!-- Button -->
                    <button type="submit"
                        class="w-full mt-4 bg-gradient-to-r from-blue-700 to-blue-900 
                        text-white py-2 rounded-lg 
                        hover:scale-[1.02] hover:shadow-lg 
                        active:scale-95 transition-all duration-200">
                        Submit Request 🚀
                    </button>

                </form>
            </div>
        </div>

        <!-- RIGHT (TABLE) -->
        <div class="col-span-2">

            <h2 class="text-xl font-semibold mb-4 border-b pb-2 dark:border-gray-700">
                My Requests
            </h2>

            <div class="h-[75vh] overflow-y-auto 
                bg-white/80 dark:bg-gray-800/80 backdrop-blur
                shadow-xl rounded-2xl border 
                border-gray-200 dark:border-gray-700">

                <table class="min-w-full text-left">

                    <thead class="sticky top-0 bg-white dark:bg-gray-800 z-10">
                        <tr class="border-b dark:border-gray-700">
                            <th class="p-3 text-center">Type</th>
                            <th class="p-3 text-center">Description</th>
                            <th class="p-3 text-center">Status</th>
                            <th class="p-3 text-center">Created</th>
                            <th class="p-3 text-center">Employee</th>
                            <th class="p-3 text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="request_table"
                        class="divide-y dark:divide-gray-700">
                    </tbody>

                </table>
            </div>
        </div>

    </div>
</div>
        </div>
        <script src="./js/api.js"></script>
        <script src="./js/service_requests.js"></script>
    </body>
</html>
