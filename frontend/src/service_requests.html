<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Dashboard</title>
    <link href="./css/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
            <div class="w-64 bg-blue-900 text-white min-h-screen p-6">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="space-y-4 font-semibold">
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="transfer.html">Transfer</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="service_requests.html">Service Requests</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="hover:text-gray-300">
                        <button onclick="logout()" class="cursor-pointer">Logout</button>
                    </li>
                </ul>
            </div>
            <!-- Main Content -->
<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-8">Service Requests</h1>

<div class=" bg-white p-6 rounded-lg shadow w-96">

<h2 class="text-lg font-semibold mb-4">Create Request</h2>

<select id="query_type" class="border p-2 w-full mb-3">
<option value="CHANGE_PIN">Change PIN</option>
<option value="CHANGE_ACCOUNT_NAME">Change Account Name</option>
<option value="UPDATE_CONTACT">Update Contact</option>
<option value="UPDATE_KYC">Update KYC</option>
<option value="CLOSE_ACCOUNT">Close Account</option>
</select>

<textarea id="description"
placeholder="Describe your request"
class="border p-2 w-full mb-3"></textarea>

<button onclick="createRequest()"
class="bg-blue-900 text-white px-4 py-2 rounded-lg  hover:bg-blue-700 cursor-pointer transition">
Submit Request
</button>

</div>

<h2 class="text-xl font-semibold mt-10 mb-4">My Requests</h2>

<table class="max-h-[5vh] min-w-full bg-white shadow rounded" id="dynamic_table">
<thead>
<tr class="border-b">
<th class="p-3">Type</th>
<th class="p-3">Description</th>
<th class="p-3">Status</th>
<th class="p-3">Created</th>
</tr>
</thead>

<tbody id="request_table"></tbody>
</table>

<div id="request_form_container"
class="hidden ml-[35%] bg-white p-6 rounded shadow w-96">

<h2 class="text-xl font-semibold mb-4">Submit Request</h2>

<div id="dynamic_form_fields"></div>

</div>

</div>

</div>

<script src="./js/api.js"></script>
<script src="./js/service_requests.js"></script>
    
</body>
</html>
