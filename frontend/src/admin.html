<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Login</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100">
                    <!-- Header -->
        <section class="w-full h-20 bg-[rgb(16,63,184)] px-6">
            <header class="w-full h-full flex items-center">
                
                <aside class="flex-1 text-xl font-bold text-white">
                    <h1>Banking Core</h1>
                </aside>
            </header>
        </section>
                    <!-- Main Content -->
        <div class="flex items-center justify-center min-h-[calc(100vh-80px)]">
            <div class="bg-white shadow-lg rounded-lg p-8 w-96">
                <h2 class="text-2xl font-bold text-center mb-6 text-blue-900">Admin Login Form</h2>
                <form onsubmit="adminLogin(event)" class="flex flex-col gap-4">
                    <label class="font-semibold">Admin Account Number</label>
                    <input type="text" id="admin_account_number" class="border p-2 rounded w-full" placeholder="Admin Account Number">
                    <label class="font-semibold">Admin PIN</label>
                    <input type="password" id="admin_pin" class="border p-2 rounded w-full" placeholder="Admin PIN">
                    <button type="submit" class="bg-blue-900 text-white py-2 rounded hover:bg-blue-700 transition">Login</button>
                </form>
            </div>
        </div>
        <script src="./js/admin.js"></script>
    </body>
</html>
