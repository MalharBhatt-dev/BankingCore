<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Core</title>
    <link href="./css/output.css" rel="stylesheet">
</head>
    <body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-[#0a2540] dark:to-[#020617] text-gray-900 dark:text-gray-100">
    <div class="flex">
                         <!-- Sidebar -->
       <aside class="w-64 bg-gradient-to-r from-blue-800 to-blue-900 dark:from-[#020617] dark:to-[#0a2540] dark:text-gray-100 backdrop-blur text-white min-h-screen p-6 border-r border-white/10 dark:border-white/10 transition-colors">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="flex flex-col font-semibold min-h-[87vh]">
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="dashboard.html">Dashboard</a>
                    </li>
                    <li class=" p-2 rounded-lg bg-white/20 hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transfer.html">Transfer</a>
                    </li>
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="transactions.html">Transactions</a>
                    </li>
                    <li class="p-2 rounded-lg hover:bg-white/10 hover:text-gray-300 dark:hover:text-gray-400 p-1 m-1 cursor-pointer">
                        <a href="service_requests.html">Service Requests</a>
                    </li>
                    <div class="mt-auto flex justify-between items-center">
                        <!-- Logout (Left) -->
                        <li class="hover:text-red-500 dark:hover:text-red-500 border rounded-lg p-2">
                            <button onclick="logout()" class="cursor-pointer">
                                Logout
                            </button>
                        </li>

                        <!-- Theme Toggle (Right) -->
                        <li>
                            <button onclick="toggleDarkMode()" id="themeBtn"
                                class="cursor-pointer px-3 py-1 border rounded-lg dark:border-gray-600">
                                🌙
                            </button>
                        </li>
                    </div>
                </ul>
            </aside>
                                        <!--Main Content-->
        <div class="flex-1 p-10 shadow w-full bg-gray-100 dark:bg-gray-900 transition">
            <div class="animate-[fadeIn_0.5s_ease-out] flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold">Transfer</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400">💸 Send money securely</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2 bg-white/60 dark:bg-gray-800/60 backdrop-blur px-4 py-2 rounded-lg shadow-sm hover:scale-105 transaction duration-200">
                    <span class="text-sm text-gray-500">Balance</span>
                    <span class="font-semibold text-green-600" id="balance_top"></span>
                </div>
            </div>
            </div>
            <div class="border-b border-gray-200 dark:border-gray-700 mb-6"></div>

                                        <!-- Account Info Div -->
                <div class="grid grid-cols-3 gap-6">
                    <div class="animate-[fadeIn_0.5s_ease-out] bg-gradient-to-bl from-blue-600 to-blue-900 text-white  dark:from-blue-600 dark:to-blue-900/80 backdrop-blur p-6 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition duration-300">
                        <h2 class="text-sm opacity-80 font-semibold mb-2 dark:text-gray-200">💰 Account Balance</h2>
                        <p class="text-3xl font-bold mt-2 text-green-500 dark:text-green-600">₹ <span id="balance">0</span></p>
                    </div>
                    <div class="animate-[fadeIn_0.6s_ease-out] bg-gradient-to-br bg-white dark:from-[#0a2540] dark:to-[#020617] p-6 rounded-xl shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300">
                        <h2 class="text-lg font-semibold mb-2 dark:text-gray-200">📊 Last Transaction</h2>
                        <p id="last_transaction" class="text-xl mt-2 text-gray-900 dark:text-gray-300">None</p>
                    </div>
                    <div class="animate-[fadeIn_0.7s_ease-out] bg-gradient-to-br bg-white dark:from-[#020617] dark:to-[#0a2540] p-6 rounded-xl shadow-md hover:shadow-xl hover:-translate-y-1 transition duration-300">
                        <h2 class="text-lg font-semibold mb-2 dark:text-gray-200">💳 Account Number</h2>
                        <p id="account_info" class="text-xl mt-2 text-gray-900 dark:text-gray-300">---</p>
                    </div>
                </div>
                                    <!--Transfer Form-->
        <div class="animate-fadeIn flex items-center justify-center mt-16">
    
    <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md shadow-xl rounded-2xl p-8 w-[420px] border border-white/20 dark:border-gray-700 transition-all duration-300 hover:shadow-2xl">
        
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-900 dark:text-blue-400">
            Transfer Money
        </h2>

        <form class="flex flex-col gap-4">

            <label class="font-semibold flex items-center gap-2 dark:text-gray-300">
               🏦 Receiver Account Number
            </label>
            <input type="number" id="to_account"
                class="border p-3 rounded-lg w-full 
                bg-white dark:bg-gray-700 
                text-black dark:text-white 
                border-gray-300 dark:border-gray-600 
                focus:ring-2 focus:ring-blue-500 focus:scale-[1.01] transition-all outline-none">

            <label class="font-semibold flex items-center gap-2 dark:text-gray-300">
               💸 Amount
            </label>
            <input type="number" id="amount"
                class="border p-3 rounded-lg w-full 
                bg-white dark:bg-gray-700 
                text-black dark:text-white 
                border-gray-300 dark:border-gray-600 
                focus:ring-2 focus:ring-blue-500 focus:scale-[1.01] transition-all outline-none">

            <p class="text-sm bg-gray-100 dark:bg-gray-700 p-3 rounded-lg text-gray-700 dark:text-gray-300 flex justify-between items-center cursor-not-allowed">
                Sender Account: 
                <span id="sender_account_display" class="font-bold text-blue-600 dark:text-blue-400">
                    Null
                </span>
            </p>
            <p class="text-xs text-gray-400">Minimum ₹1 required</p>

            <button type="button" onclick="transferMoney()"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-800 dark:from-blue-700 dark:to-blue-900 text-white py-2 rounded-lg 
                hover:from-blue-700 hover:to-blue-900 dark:hover:from-blue-800 dark:hover:to-blue-900 active:scale-95 transition-all duration-200 shadow-md hover:shadow-lg">
                Send Money
            </button>

        </form>
    </div>
</div>
    </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/transfer.js"></script>
    <script src="./js/dashboard.js"></script>
</body>
</html>
