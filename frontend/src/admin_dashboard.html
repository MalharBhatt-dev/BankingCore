<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        <link href="./css/output.css" rel="stylesheet">
    </head>
    <body class="bg-gray-100">
        <div class="flex">
                            <!-- Sidebar -->
            <div class="w-64 bg-blue-900 text-white min-h-screen p-6">
                <h2 class="text-2xl font-bold mb-8">MyBank</h2>
                <ul class="space-y-4 font-semibold">
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="admin_dashboard.html">Admin Dashboard</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <a href="admin_unlock_account.html">Unlock Account</a>
                    </li>
                    <li class="hover:text-gray-300 cursor-pointer">
                        <button onclick="adminLogout()">Logout</button>
                    </li>
                </ul>
            </div>
                        <!-- Main Content -->
            <div class="flex-1  p-10 max-w-7xl">
                <h1 class="text-3xl font-bold mb-8">Admin Dashboard</h1>
                <!-- Admin Overview Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <!-- Total Bank Balance -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 class="text-lg font-semibold mb-2">Total Bank Balance</h2>
                        <p class="text-2xl font-bold text-green-600">
                            ₹ <span id="total_balance">0</span>
                        </p>
                    </div>
                    <!-- Total Accounts -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 class="text-lg font-semibold mb-2">Total Accounts</h2>
                        <p class="text-2xl font-bold text-blue-600">
                            <span id="total_accounts">0</span>
                        </p>
                    </div>
                    <!-- Total Locked Accounts -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 class="text-lg font-semibold mb-2">Locked Accounts</h2>
                        <p class="text-2xl font-bold text-red-600">
                            <span id="locked_accounts">0</span>
                        </p>
                    </div>
                    <!-- Last Locked / Unlocked -->
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h2 class="text-lg font-semibold mb-2">Last Lock / Unlock Event</h2>
                        <p id="last_lock_event">None</p>
                    </div>
                </div>
 <!-- Security Events Table -->
<div class="mt-10 p-6 rounded-lg shadow">

 <div class="flex-1 p-6">
                <h1 class="text-3xl font-bold mb-8">Security Events</h1>
                <div class="max-h-[80vh] overflow-y-auto flex-1 bg-white shadow rounded-lg">
                    <div class="p-6">
                        <table class="min-w-full text-left border-collapse">
                            <thead class="border-b">
                                <tr class="border-b hover:bg-gray-100">
                                    <th class="p-3 sticky top-0 bg-white z-10">Account Number</th>
                                    <th class="p-3 sticky top-0 bg-white z-10">Event</th>
                                    <th class="p-3 sticky top-0 bg-white z-10">Balance</th>
                                    <th class="p-3 sticky top-0 bg-white z-10">Date</th>
                                </tr>
                            </thead>
                            <tbody id="event_table" class="divide-y">
                                <!-- JS will insert rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

</div>
               
            </div>
        </div>
        <script src="./js/api.js"></script>
        <script src="./js/admin.js"></script>
        <script src="./js/admin_dashboard.js"></script>
    </body>
</html>
