<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Core</title>
    <link href="./css/output.css" rel="stylesheet">
</head>

<!--  LIGHT MODE BACKGROUND -->
<body class="bg-gradient-to-br from-blue-50 to-blue-100 dark:from-gray-900 dark:to-gray-800">
    <!-- Header -->
    <section class="w-full h-20 bg-[rgb(16,63,184)] px-6 shadow-md">
        <header class="flex items-center justify-between h-full">
            <h1 class="text-xl font-bold text-white font-sans">Banking Core</h1>
            <div>
            <a href="register.html">
                <button class="rounded-full font-semibold text-sm text-white border border-white px-4 py-2 hover:bg-white hover:text-blue-900 transition">
                    Register Account
                </button>
            </a>

            <!-- Theme Button -->
            <button onclick="toggleDarkMode()" id="themeBtn"
                class="ml-4 text-white border px-3 py-1 rounded hover:bg-white hover:text-blue-900 transition">
                🌙
            </button>
            </div>
        </header>
    </section>

    <!-- Login Section -->
    <section class="flex items-center justify-center min-h-[calc(100vh-80px)]">
        
        <!--CARD -->
        <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md p-8 rounded-2xl shadow-xl w-96 border border-white/40 dark:border-gray-700 animate-fadeIn transition">
            <h2 class="text-3xl font-bold text-blue-900 dark:text-white">Welcome Back</h2>
            <p class="text-gray-500 dark:text-gray-400">Login to your account</p>

            <form class="flex flex-col gap-4 font-semibold" id="loginform" onsubmit="login(event)">

                <!-- Account -->
                <div class="relative">
                    <input type="number" id="account_number" placeholder=" "
                        class="peer w-full p-2 bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 border rounded-lg px-3 pt-5 pb-2 focus:ring-2 focus:ring-blue-500 outline-none">  
                    <label class="absolute left-3 top-2 text-gray-500 text-sm transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-focus:top-2 peer-focus:text-sm">
                        Account Number
                    </label>
                </div>

                <!-- PIN -->
                <div class="relative">
                    <input type="password" id="pin_number" placeholder=" "
                        class="peer w-full p-2 bg-white dark:bg-gray-800 dark:text-white dark:border-gray-600 border rounded-lg px-3 pt-5 pb-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    <label class="absolute left-3 top-2 text-gray-500 text-sm transition-all peer-placeholder-shown:top-3.5 peer-placeholder-shown:text-base peer-focus:top-2 peer-focus:text-sm">
                        PIN Number
                    </label>

                    <button type="button" id="toggleIcon" onclick="togglePin()"
                        class="absolute right-3 top-2.5 text-gray-500 hover:text-blue-700">
                        👁️
                    </button>
                </div>

                <!-- Remember -->
                <div class="flex items-center text-sm">
                    <label class="flex items-center gap-2 dark:text-white">
                        <input type="checkbox" id="rememberMe" class="accent-blue-700">
                        Remember Me
                    </label>
                </div>

                <!-- Error -->
                <p id="errorMsg" class="text-red-500 text-sm hidden"></p>

                <!-- Button -->
                <button type="submit" id="loginBtn"
                    class="bg-blue-800 dark:bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-900 dark:hover:bg-blue-700 transition flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">

                    <span id="btnText">Login</span>

                    <svg id="spinner" class="hidden w-5 h-5 animate-spin" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4"></circle>
                        <path class="opacity-75" fill="white"
                            d="M4 12a8 8 0 018-8v4a4 4 00-4 4H4z"></path>
                    </svg>
                </button>

            </form>
        </div>
    </section>

    <script src="js/login.js"></script>
</body>
</html>
